<body>
    <div class="book-container">
        <div class="book-header">
            <h1>PATH TO MASTERY</h1>

                    <button class="close-toc" onclick="toggleTOC()">✕</button>
                </h3>

            </div>

            <div class="reader-area" id="reader-area">

                <div class="nav-buttons">
                    <button class="nav-btn" id="prev-btn" onclick="changeChapter(-1)">← Iliyopita</button>
                    <span class="page-indicator" id="page-indicator">Sura ya 1 kati ya 33</span>
                    <button class="nav-btn" id="next-btn" onclick="changeChapter(1)">Ijayo →</button>
                </div>

    <script>
        // COMPLETE SWAHILI BOOK - 31 CHAPTERS + COVER + COMPLETION PAGE = 33 PAGES
        const chapters = [
            // COVER - Sura ya 0
            {
                part: "COVER",
                title: "COVER",
                isCover: true,
                content: `
                    <div class="cover-page">
                        <div class="cover-title">NJIA YA<br>UMAHIRI</div>
                        <div class="cover-subtitle">Kurejesha Ubongo Wako, Kujikomboa Kutoka Kwenye Ponografia, na Kurudisha Uwezo Wako Kitandani</div>
                        <div class="cover-author">Dr. King</div>
                        <div class="cover-quote">"Sio ukamilifu—ni umahiri. Unapoelewa mwili wako, unajua jinsi ya kuuongoza."</div>
                    </div>
                `
            },
            // BARUA - Sura ya 1
            {
                part: "BARUA KUTOKA KWA Dr. King",
                title: "Barua kutoka kwa Dr. King",
                content: `Mpendwa Msomaji,

Ukiwa unashikilia kitabu hiki, nataka ujue jambo moja muhimu tangu mwanzo: umepata bahati ambayo watu wengi wameikosa na nikwambie tu wewe si kitu kilichovunjika kwamba hauwezi kupata suluhu ya shida inayokusumbua. Hauko peke yako, na njia ya umahiri iko wazi kwako.

Nimetumia miaka mingi kufanya kazi na wanaume waliofika ofisini kwangu wakiwa wameinamisha vichwa vyao, wasiweze kuniangalia machoni. Waliniambia hadithi za aibu, za kuepuka kushiriki tendo, za kuhisi kuwa si wanaume wa kutosha kwa sababu ya kile kilichokuwa kikitokea chumbani. Wengine walikuwa na miaka ishirini, wengine hamsini. Lakini wote walikuwa na kitu kimoja: waliamini kuwa kuna kitu hakipo sawa.

Nataka uelewe hili. Kumwaga mapema kunaathiri takriban mwanaume mmoja kati ya watatu. Hiyo inamaanisha ukiwa katika chumba na wanaume wengine wawili, kuna uwezekano mmoja wao anakabiliwa na hili. Ni jambo la kawaida sana. Lakini kuwa kawaida hakumaanishi lazima ukubali kuwa hali yako ya kudumu.

Habari njema? Kwa mbinu sahihi, umahiri unawezekana. Si ukamilifu—umahiri. Tofauti ni muhimu. Ukamilifu unamaanisha kushindwa kamwe. Umahiri unamaanisha unaelewa mwili wako, unajua jinsi ya kuuongoza, na mambo yasipokwenda sawa kabisa, unajua jinsi ya kushughulikia bila aibu.

Kitabu hiki ni tofauti na vile ambavyo huenda umesoma kabla. Sitakupa lugha ngumu za kitabibu au kukuaibisha kwa tabia zako. Nitakuambia hadithi—hadithi kuhusu jinsi maisha ya kisasa, urahisi wa kupata ponografia, na namna wengi wetu tulivyojifunza kujiridhisha wenyewe, imeifundisha akili na miili yetu kwa bahati mbaya kutushindisha chumbani. Na kisha nitakuonyesha, hatua kwa hatua rahisi, jinsi ya kubadilisha mafunzo hayo.

Fikiria hii kama ramani ya kurudi kwako mwenyewe. Toleo lako linalojiamini, lenye udhibiti, na huru kutoka kwa wasiwasi uliokuwa unakuzuia.

Tuanze safari ya umahiri.

Kwa matumaini,
Dr. King`
            },
            // Sura ya 1: Kutana na James
            {
                part: "SEHEMU YA KWANZA: HADITHI TUSIOIZUNGUMZIA",
                title: "Sura ya 1: Kutana na James – Hadithi Unayoweza Kuijua",
                content: `Nikuambie kuhusu James.

James ana miaka 28. Ni mtu mzuri—anafanya kazi kwa bidii, ana marafiki, anajali afya yake. Amekuwa na mchumba wake Sarah kwa takriban miezi sita, na mambo yanaenda vizuri. Yeye ni mkarimu, mcheshi, na anafurahia kweli kutumia muda naye.

Lakini kuna tatizo. Tatizo linalomfanya James ashindwe kulala usiku, linalomfanya moyo wake udondoke Sarah anapomkaribia, na kumfanya atoe visingizio ili kuepuka kushiriki naye.

Tatizo lilianza mara ya tatu walipokuwa pamoja. Mambo yalikuwa ni moto, na James akahisi msisimko ule wa kawaida. Na kisha, kabla hata hajafanya naye chochote, ilikuwa imeisha. Chini ya dakika moja. Labda sekunde thelathini.

Sarah alikuwa ni muelewa akabaki akimwambia. "Usijali mpenzi, hutokea."

Lakini James hakuweza kuondoa aibu. Sauti kichwani mwake haikukoma: "Kuna shida gani tena? Mwanaume halisi angedumu muda mrefu zaidi. Ataachana nawe na kutafuta mtu bora zaidi."

Mara iliyofuata, James alikuwa na wasiwasi sana kuhusu jambo hilo kutokea tena hivi kwamba aliweza kuhisi moyo wake ukidunda kwa kasi kabla hawajaanza. Na hakika—ilikuwa haraka zaidi wakati huu.

Sasa James anajikuta anaepuka kushiriki kabisa. Anakaa hadi usiku anaangalia TV, akitumaini Sarah atakuwa amelala atakapoingia kitandani. Sarah akihitaji tendo, anatoa visingizio—amechoka, ana msongo kazini, amekula sana. Wakati ndani, anavunjika. Anakosa ukaribu, anakosa kuhisi karibu naye. Lakini hofu ya kushindwa tena ina nguvu kuliko hamu yake.

James alianza kutazama ponografia akiwa na miaka 12. Kufikia 14, alikuwa akiitazama karibu kila siku. Alijifunza kuhusu ngono kutoka kwenye skrini—inavyopaswa kuonekana, inavyopaswa kudumu, wanachotaka wanawake. Hakuwahi kuzungumza na mtu yeyote kuhusu hilo. Ulikuwa ulimwengu wake wa siri.

Na sasa, akiwa na miaka 28, James anagundua kwamba ulimwengu wake wa siri huenda umeifundisha mwili wake kwa njia ambazo hakuwahi kutarajia.

            const tocList = document.getElementById('toc-list');

            chapters.forEach((chapter, index) => {
                if (chapter.isCover) {
                    const chapterDiv = document.createElement('div');
                    chapterDiv.className = 'toc-chapter';
                    if (index === currentChapter) chapterDiv.classList.add('active');
                    chapterDiv.textContent = '📖 Cover';
                    chapterDiv.onclick = () => goToChapter(index);
                    tocList.appendChild(chapterDiv);
                } else if (chapter.isCompletion) {

                    chapterDiv.textContent = '🎉 Hongera!';
                    chapterDiv.onclick = () => goToChapter(index);
                    tocList.appendChild(chapterDiv);
                } else {
                    if (index === 1 || (index > 1 && chapters[index-1].part !== chapter.part && !chapters[index-1].isCover && !chapters[index-1].isCompletion)) {
                        const partDiv = document.createElement('div');
                        partDiv.className = 'toc-part';
                        partDiv.textContent = chapter.part;
                        tocList.appendChild(partDiv);
                    }
                    
                    const chapterDiv = document.createElement('div');
                    chapterDiv.className = 'toc-chapter';
                    if (index === currentChapter) chapterDiv.classList.add('active');
                    chapterDiv.textContent = chapter.title;
                    chapterDiv.onclick = () => goToChapter(index);
                    tocList.appendChild(chapterDiv);
                }
            });
        }

        function renderChapter() {
            const container = document.getElementById('chapter-content-container');
            const chapter = chapters[currentChapter];
            
            let content = '';
            if (chapter.isCover || chapter.isCompletion) {
                content = chapter.content;
            } else {
                content = `
                    <div class="chapter-title">${chapter.title}</div>
                    <div class="chapter-body">${chapter.content.replace(/\n/g, '<br>').replace(/•/g, '•')}</div>
                `;
            }
            
            container.innerHTML = `
                <div class="chapter-content active">
                    ${content}
                </div>
            `;
            
            document.getElementById('page-indicator').textContent = `Sura ya ${currentChapter + 1} kati ya ${totalChapters}`;
            
            document.querySelectorAll('.toc-chapter').forEach((el, idx) => {
                if (idx === currentChapter) el.classList.add('active');
                else el.classList.remove('active');
            });
            
            document.getElementById('prev-btn').disabled = currentChapter === 0;
            document.getElementById('next-btn').disabled = currentChapter === totalChapters - 1;
            
            if (window.innerWidth <= 768) {
                document.getElementById('tocSidebar').classList.remove('visible');
                document.getElementById('tocToggle').classList.remove('active');
                document.getElementById('tocToggle').innerHTML = '<span>📖 ONYESHA YALIYOMO</span><span class="arrow">▼</span>';
            }

        function toggleTOC() {
            const tocSidebar = document.getElementById('tocSidebar');
            const tocToggle = document.getElementById('tocToggle');
            
            tocSidebar.classList.toggle('visible');
            tocToggle.classList.toggle('active');
            
            if (tocSidebar.classList.contains('visible')) {
                tocToggle.innerHTML = '<span>📖 FICHA YALIYOMO</span><span class="arrow">▼</span>';
            } else {
                tocToggle.innerHTML = '<span>📖 ONYESHA YALIYOMO</span><span class="arrow">▼</span>';
            }
        }

        function changeChapter(direction) {
            const newChapter = currentChapter + direction;
            if (newChapter >= 0 && newChapter < totalChapters) {
                currentChapter = newChapter;
                renderChapter();
            }
        }

        function goToChapter(index) {
            currentChapter = index;
            renderChapter();
        }

        window.addEventListener('resize', function() {
